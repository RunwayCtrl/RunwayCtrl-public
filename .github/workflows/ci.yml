name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, Type Check, Test, Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: runwayctrl
          POSTGRES_PASSWORD: runwayctrl
          POSTGRES_DB: runwayctrl_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U runwayctrl"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://runwayctrl:runwayctrl@localhost:5432/runwayctrl_test
      NODE_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # version from package.json "packageManager" field

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prettier format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Run database migrations
        run: pnpm db:migrate

      - name: Type check
        run: pnpm -r typecheck

      - name: Run tests
        run: pnpm test

  # Integration tests run separately — only on main branch pushes.
  # Disabled until real integration tests exist (avoids perpetual red X).
  # To re-enable: remove the `false &&` prefix from the `if` condition.
  # Requires secrets: JIRA_BASE_URL, JIRA_EMAIL, JIRA_API_TOKEN,
  #   SERVICENOW_INSTANCE_URL, SERVICENOW_USERNAME, SERVICENOW_PASSWORD,
  #   GITHUB_TOKEN (for integration test repo)
  integration:
    name: Integration Tests (real APIs)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: false && github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: ci

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: runwayctrl
          POSTGRES_PASSWORD: runwayctrl
          POSTGRES_DB: runwayctrl_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U runwayctrl"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://runwayctrl:runwayctrl@localhost:5432/runwayctrl_test
      NODE_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # version from package.json "packageManager" field

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run database migrations
        run: pnpm db:migrate

      - name: Run integration tests
        run: pnpm test:integration
