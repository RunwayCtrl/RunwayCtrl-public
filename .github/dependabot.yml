version: 2

updates:
  # JavaScript/TypeScript dependencies (pnpm workspace via lockfile)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: UTC
    open-pull-requests-limit: 10
    labels:
      - dependencies
    groups:
      production-dependencies:
        dependency-type: production
      dev-dependencies:
        dependency-type: development

  # Keep GitHub Actions pinned versions up-to-date
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:15'
      timezone: UTC
    open-pull-requests-limit: 10
    labels:
      - dependencies
