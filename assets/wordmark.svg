<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" height="180" viewBox="0 0 900 180" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="RunwayCtrl wordmark">
  <defs>
    <linearGradient id="wm" x1="0" y1="0" x2="900" y2="180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7C3AED"/>
      <stop offset="0.55" stop-color="#06B6D4"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feColorMatrix in="b" type="matrix" values="0 0 0 0 0.55  0 0 0 0 0.30  0 0 0 0 0.95  0 0 0 0.20 0" result="c"/>
      <feMerge>
        <feMergeNode in="c"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- tiny runway mark -->
  <g transform="translate(44 36)" filter="url(#soft)">
    <rect x="0" y="0" width="108" height="108" rx="28" fill="#0B1220" stroke="url(#wm)" stroke-width="2" opacity="0.9"/>
    <path d="M54 18V90" stroke="url(#wm)" stroke-width="6" stroke-linecap="round"/>
    <path d="M54 32V36" stroke="#E5E7EB" stroke-width="4" stroke-linecap="round" opacity="0.85"/>
    <path d="M54 48V52" stroke="#E5E7EB" stroke-width="4" stroke-linecap="round" opacity="0.85"/>
    <path d="M54 64V68" stroke="#E5E7EB" stroke-width="4" stroke-linecap="round" opacity="0.85"/>
    <circle cx="34" cy="36" r="3" fill="#38BDF8" opacity="0.95"/>
    <circle cx="74" cy="36" r="3" fill="#38BDF8" opacity="0.95"/>
    <circle cx="30" cy="56" r="3" fill="#22C55E" opacity="0.9"/>
    <circle cx="78" cy="56" r="3" fill="#22C55E" opacity="0.9"/>
    <circle cx="34" cy="76" r="3" fill="#A78BFA" opacity="0.95"/>
    <circle cx="74" cy="76" r="3" fill="#A78BFA" opacity="0.95"/>
  </g>

  <!-- wordmark -->
  <g transform="translate(182 58)" filter="url(#soft)">
    <text x="0" y="58" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="68" font-weight="800" fill="#E5E7EB" letter-spacing="-1.2">
      Runway<tspan fill="url(#wm)">Ctrl</tspan>
    </text>
  </g>
</svg>
